{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 560px; margin: 40px auto;">
    <h2>Register</h2>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>{{ form.username.label }}</label>
        {{ form.username() }}
        <label>{{ form.email.label }}</label>
        {{ form.email() }}
        <label>{{ form.password.label }}</label>
        {{ form.password() }}
        <label>{{ form.confirm_password.label }}</label>
        {{ form.confirm_password() }}
        <label>{{ form.role.label }}</label>
        {{ form.role() }}
        {{ form.submit() }}
    </form>
    <p><a href="{{ url_for('auth.login') }}">Back to login</a></p>
</div>
{% endblock %}
