{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 460px; margin: 50px auto;">
    <h2>Login</h2>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>{{ form.username.label }}</label>
        {{ form.username() }}
        <label>{{ form.password.label }}</label>
        {{ form.password() }}
        {{ form.submit() }}
    </form>
    <p><a href="{{ url_for('auth.register') }}">Create an account</a></p>
</div>
{% endblock %}
