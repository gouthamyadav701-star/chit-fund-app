{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 560px;">
    <h2>Record Payment</h2>
    <p><strong>{{ member.name }}</strong></p>
    <p>Due Amount: Rs {{ "%.2f"|format(member.due_amount) }}</p>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>{{ form.membership_id.label }}</label>
        {{ form.membership_id() }}
        <label>{{ form.amount.label }}</label>
        {{ form.amount() }}
        {{ form.submit() }}
    </form>
</div>
{% endblock %}
