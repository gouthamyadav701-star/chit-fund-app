services:
  - type: web
    name: chit-fund-app
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chit-fund-db
          property: connectionString

databases:
  - name: chit-fund-db
    plan: free
